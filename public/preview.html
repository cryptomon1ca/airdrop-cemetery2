// Compute avg crash
document.getElementById("avg-crash").textContent =
  Math.round(PROJECTS.reduce((a,p)=>a+Math.abs(p.priceChange),0)/PROJECTS.length) + "%";

// TICKER
(function(){
  const ticker = document.getElementById("ticker");
  const items = [
    {icon:"💀", val:PROJECTS.length, lbl:"DEAD AIRDROPS"},
    {icon:"📉", val:Math.round(PROJECTS.reduce((a,p)=>a+Math.abs(p.priceChange),0)/PROJECTS.length)+"%", lbl:"AVG CRASH"},
    {icon:"🔥", val:PROJECTS.filter(p=>p.status==="dead").length, lbl:"已完全归零"},
    {icon:"🔪", val:Math.max(...PROJECTS.map(p=>p.communityBackstab))+"/10", lbl:"最高背刺分"},
    {icon:"📅", val:"2020–2024", lbl:"TGE年代跨度"},
    {icon:"💸", val:"$220亿", lbl:"最高FDV泡沫"},
  ];
  [...items,...items].forEach(s=>{
    const sp = document.createElement("span");
    sp.className = "ticker-item";
    sp.innerHTML = `${s.icon} <span class="val">${s.val}</span> <span class="lbl">${s.lbl}</span><span class="ticker-sep">//</span>`;
    ticker.appendChild(sp);
  });
})();

function blocks(v, max, color) {
  return Array.from({length:max}).map((_,i)=>`<span class="block" style="background:${i<v?color:'#E8E0C8'}"></span>`).join("");
}

function makeCard(p, idx) {
  const bg = CAT_COLORS[p.category] || "#FFD700";
  const st = STATUS[p.status];
  const tvlColor = p.tvlRetention < 20 ? "#CC0000" : p.tvlRetention < 60 ? "#FF8C00" : "#228B22";
  return `<div class="card" style="animation-delay:${idx*35}ms" onclick="openModal('${p.id}')">
    <div class="card-cat" style="background:${bg}">
      <span class="card-cat-label">${p.category}</span>
      <span class="card-cat-date">TGE ${p.tgeDate}</span>
    </div>
    <div class="card-body">
      <div>
        <div class="card-name">${p.name}</div>
        <div class="card-symbol">\\ ${p.symbol}</div>
      </div>
      <div class="crash-badge">
        <div class="crash-num">${p.priceChange}%</div>
        <div class="crash-lbl">崩跌</div>
      </div>
    </div>
    <div class="card-desc">${p.description}</div>
    <div class="divider"></div>
    <div class="card-price">
      <div class="price-label">价格轨迹</div>
      <span class="ath">$${p.athPrice}</span>
      <span class="arrow">→</span>
      <span class="current">$${p.currentPrice}</span>
    </div>
    <div class="divider"></div>
    <div class="card-ratings">
      <div class="rating-row">
        <span class="rating-label">TVL 留存</span>
        <div class="blocks">${blocks(Math.round(p.tvlRetention/20),5,tvlColor)}</div>
      </div>
      <div class="rating-row">
        <span class="rating-label">背刺程度</span>
        <div class="blocks">${blocks(Math.round(p.communityBackstab/2),5,"#CC0000")}</div>
      </div>
    </div>
    <div class="card-footer" style="background:${st.bg}">
      <span class="status-text">${st.icon} ${st.label}</span>
      <span class="view-link">查看档案 →</span>
    </div>
  </div>`;
}

function openModal(id) {
  const p = PROJECTS.find(x=>x.id===id); if(!p) return;
  const bg = CAT_COLORS[p.category] || "#FFD700";
  const st = STATUS[p.status];
  document.getElementById("modal-content").innerHTML = `
    <div class="modal-header" style="background:${bg}">
      <div class="modal-header-top">
        <span class="modal-cat">${p.category}</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-title-row">
        <div>
          <h2 class="modal-name">${p.name}</h2>
          <div class="modal-symbol">\\ ${p.symbol}</div>
        </div>
        <div class="modal-crash">
          <div class="modal-crash-num">${p.priceChange}%</div>
          <div class="modal-crash-lbl">崩跌</div>
        </div>
      </div>
    </div>
    <div class="modal-body">
      <p class="modal-desc">${p.description}</p>
      <div class="price-compare">
        <div class="price-box">
          <div class="price-box-lbl" style="color:#888">🚀 TGE ATH</div>
          <div class="price-box-val" style="color:#888;text-decoration:line-through">$${p.athPrice}</div>
        </div>
        <div class="price-arrow">→</div>
        <div class="price-box dead">
          <div class="price-box-lbl" style="color:#CC0000">📉 当前价格</div>
          <div class="price-box-val" style="color:#CC0000">$${p.currentPrice}</div>
        </div>
      </div>
      ${p.reasons.length ? `
      <div class="reasons">
        <div class="section-title" style="color:#CC0000">☠ 死亡原因</div>
        ${p.reasons.map(r=>`<div class="reason-item"><span class="reason-bullet">▸</span><span>${r}</span></div>`).join("")}
      </div>` : ""}
      ${p.controversies.length ? `
      <div class="controversies">
        <div class="section-title" style="color:#8B4500">⚠ 争议事件</div>
        <div class="controversy-tags">
          ${p.controversies.map(c=>`<span class="controversy-tag">${c}</span>`).join("")}
        </div>
      </div>` : ""}
      <div class="modal-links">
        <a class="modal-link-btn" href="${p.links&&p.links.website?p.links.website:'#'}" target="_blank">🌐 官网 →</a>
      </div>
    </div>
    <div class="modal-footer" style="background:${st.bg}">
      <span>${st.icon}</span>
      <span class="modal-footer-text">${p.controversies[0]||"空投归零"}</span>
    </div>`;
  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

function getFiltered() {
  let list = PROJECTS.filter(p => {
    const mc = selCat==="All" || p.category===selCat;
    const ms = !query || p.name.toLowerCase().includes(query) || p.symbol.toLowerCase().includes(query) || p.description.toLowerCase().includes(query);
    return mc && ms;
  });
  if(selSort==="drop")     list.sort((a,b)=>a.priceChange-b.priceChange);
  if(selSort==="backstab") list.sort((a,b)=>b.communityBackstab-a.communityBackstab);
  if(selSort==="date")     list.sort((a,b)=>b.tgeDate.localeCompare(a.tgeDate));
  if(selSort==="tvl")      list.sort((a,b)=>a.tvlRetention-b.tvlRetention);
  return list;
}

function filterAndRender() {
  query = document.getElementById("search-input").value.toLowerCase();
  render();
}

function render() {
  const CATS = ["All","DeFi","L2","Social","GameFi","Meme"];
  const SORTS = [["drop","📉 跌幅"],["backstab","🔪 背刺"],["date","📅 日期"],["tvl","📊 TVL留存"]];

  document.getElementById("cat-btns").innerHTML = CATS.map(c =>
    `<button class="filter-btn${selCat===c?' active':''}" onclick="selCat='${c}';render()">${c==="All"?"📋 全部":c}</button>`
  ).join("");

  document.getElementById("sort-btns").innerHTML = SORTS.map(([k,l]) =>
    `<button class="filter-btn${selSort===k?' active':''}" onclick="selSort='${k}';render()">${l}</button>`
  ).join("");

  const filtered = getFiltered();
  document.getElementById("result-count").textContent = `RESULTS — ${filtered.length} 具尸体`;
  document.getElementById("grid").innerHTML = filtered.length
    ? filtered.map((p,i)=>makeCard(p,i)).join("")
    : `<div class="empty"><div class="empty-icon">🪦</div><p class="empty-text">没有找到匹配的尸体</p></div>`;
}

render();
</script>
